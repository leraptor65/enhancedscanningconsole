services:
  esc-app:
    image: leraptor65/enhancedscanningconsole:latest
    container_name: enhancedscanningconsole
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/backend/data
      # Map /dev/input so the backend evdev script can read the scanner headlessly
      - /dev/input:/dev/input:ro
    # privileged mode or device mapping is required for evdev to read input devices
    privileged: true
